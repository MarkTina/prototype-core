name: 发布 npm 包

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: 校验版本
        shell: bash
        run: |
          EXPECTED_TAG="v$(node -p "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "$EXPECTED_TAG"
      - run: pnpm pack --pack-destination release
      - run: npm publish --access public
      - name: 创建 Release
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create "$GITHUB_REF_NAME" release/*.tgz --generate-notes --title "Prototype Core $VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
